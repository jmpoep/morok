name: "Setup LLVM trunk (source build)"
description: >
  Restore, or build-from-source + explicitly cache, an upstream LLVM trunk
  toolchain (clang + opt + the cmake package + headers + static libs) pinned to a
  commit. The install directory is cached keyed by the commit SHA and saved by an
  explicit cache step immediately after the build, so a successful (expensive)
  LLVM build is preserved even if later job steps fail. sccache (configured by the
  caller) makes the rare cold/bumped rebuild incremental.

inputs:
  llvm-ref:
    description: "Upstream llvm/llvm-project commit SHA to build."
    required: true
  cache-version:
    description: "Bump to invalidate every LLVM install cache (recipe changes)."
    required: false
    default: "v5"

outputs:
  install-prefix:
    description: "Absolute path to the LLVM install prefix."
    value: ${{ steps.vars.outputs.prefix }}
  llvm-dir:
    description: "Path to lib/cmake/llvm (for -DLLVM_DIR)."
    value: ${{ steps.vars.outputs.llvm_dir }}
  clang:
    description: "Path to the built clang driver."
    value: ${{ steps.vars.outputs.clang }}
  clangxx:
    description: "Path to the built clang++ driver."
    value: ${{ steps.vars.outputs.clangxx }}
  cache-hit:
    description: "Whether the LLVM install was restored from cache."
    value: ${{ steps.restore.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Resolve paths
      id: vars
      shell: bash
      run: |
        set -euo pipefail
        prefix="${RUNNER_TEMP//\\//}/llvm-install"
        echo "prefix=$prefix"                  >> "$GITHUB_OUTPUT"
        echo "llvm_dir=$prefix/lib/cmake/llvm"  >> "$GITHUB_OUTPUT"
        if [ "$RUNNER_OS" = "Windows" ]; then
          echo "clang=$prefix/bin/clang.exe"     >> "$GITHUB_OUTPUT"
          echo "clangxx=$prefix/bin/clang++.exe"  >> "$GITHUB_OUTPUT"
        else
          echo "clang=$prefix/bin/clang"          >> "$GITHUB_OUTPUT"
          echo "clangxx=$prefix/bin/clang++"      >> "$GITHUB_OUTPUT"
        fi

    - name: Restore LLVM install cache
      id: restore
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.vars.outputs.prefix }}
        key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-version }}-${{ inputs.llvm-ref }}

    - name: Build + install LLVM trunk (cache miss)
      if: steps.restore.outputs.cache-hit != 'true'
      shell: bash
      env:
        LLVM_REF: ${{ inputs.llvm-ref }}
        PREFIX: ${{ steps.vars.outputs.prefix }}
        CMAKE_C_COMPILER_LAUNCHER: sccache
        CMAKE_CXX_COMPILER_LAUNCHER: sccache
      run: |
        set -euo pipefail
        SRC="${RUNNER_TEMP//\\//}/llvm-project"
        BUILD="${RUNNER_TEMP//\\//}/llvm-build"

        echo "::group::Fetch llvm-project @ ${LLVM_REF}"
        rm -rf "$SRC" "$BUILD"
        mkdir -p "$SRC"
        git -C "$SRC" init -q
        git -C "$SRC" remote add origin https://github.com/llvm/llvm-project.git
        git -C "$SRC" -c protocol.version=2 fetch --depth 1 --no-tags origin "$LLVM_REF"
        git -C "$SRC" checkout -q --detach FETCH_HEAD
        echo "::endgroup::"

        ncpu="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)"

        # Single args array (seeded non-empty) so expansion is safe under set -u
        # even on the macOS runners' bash 3.2.
        ARGS=(
          -G Ninja
          -S "$SRC/llvm" -B "$BUILD"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX="$PREFIX"
          -DLLVM_ENABLE_PROJECTS=clang
          -DLLVM_TARGETS_TO_BUILD="X86;AArch64"
          -DLLVM_ENABLE_ASSERTIONS=OFF
          # Pin ABI-breaking checks OFF (the default WITH_ASSERTS produced an
          # install whose headers and libs disagreed on the ilist_iterator type,
          # breaking the IR-test link); FORCE_OFF bakes a consistent value that
          # also matches the toolchain Morok is developed against.
          -DLLVM_ABI_BREAKING_CHECKS=FORCE_OFF
          -DLLVM_INCLUDE_TESTS=OFF
          -DLLVM_INCLUDE_EXAMPLES=OFF
          -DLLVM_INCLUDE_BENCHMARKS=OFF
          -DLLVM_INCLUDE_DOCS=OFF
          -DLLVM_ENABLE_TERMINFO=OFF
          -DLLVM_ENABLE_LIBXML2=OFF
          -DLLVM_ENABLE_LIBEDIT=OFF
          -DLLVM_ENABLE_ZLIB=OFF
          -DLLVM_ENABLE_ZSTD=OFF
          # Do NOT use LLVM_EXPORT_SYMBOLS_FOR_PLUGINS: it restricts the tool's
          # exported symbols to a curated plugin-API list that omits symbols the
          # Morok passes use (e.g. llvm::CallbackVH::anchor), so the plugin fails
          # to dlopen. We instead rely on full symbol export (Mach-O default on
          # macOS; --export-dynamic on Linux below).
          -DLLVM_EXPORT_SYMBOLS_FOR_PLUGINS=OFF
          -DLLVM_OPTIMIZED_TABLEGEN=ON
          -DLLVM_PARALLEL_LINK_JOBS=2
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
        )
        if [ "$RUNNER_OS" = "Windows" ]; then
          # MSVC env set up by the caller; Release has no debug info, keeping
          # sccache able to cache (it cannot cache /Zi PDB writes). Build libclang
          # static so its DLL import library does not blow the 65535-object limit
          # (LNK1189).
          ARGS+=(
            -DCMAKE_C_COMPILER=cl
            -DCMAKE_CXX_COMPILER=cl
            -DCMAKE_POLICY_DEFAULT_CMP0141=NEW
            -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=
            -DLIBCLANG_BUILD_STATIC=ON
          )
        else
          # Build LLVM with the host clang (matches the host C++ stdlib, which the
          # freshly-built clang then also uses to build Morok); pick a fast linker.
          if command -v clang >/dev/null 2>&1; then
            ARGS+=( -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ )
          fi
          if command -v ld.lld >/dev/null 2>&1; then
            ARGS+=( -DLLVM_USE_LINKER=lld )
          fi
          if [ "$RUNNER_OS" = "Linux" ]; then
            # ELF hides symbols by default; export all of clang/opt's symbols so
            # the dlopen-ed plugin can resolve the LLVM symbols it references.
            ARGS+=( -DCMAKE_EXE_LINKER_FLAGS=-Wl,--export-dynamic )
          fi
        fi

        echo "::group::Configure LLVM"
        cmake "${ARGS[@]}"
        echo "::endgroup::"

        echo "::group::Build + install LLVM (slow, cached right after this)"
        cmake --build "$BUILD" --target install --parallel "$ncpu"
        echo "::endgroup::"

        # Reclaim disk before the cache save (Windows runners are tight).
        rm -rf "$BUILD" "$SRC"
        sccache --show-stats || true

    # Explicit save immediately after the build so a successful LLVM build is
    # uploaded even if a later job step (Morok build / tests) fails.
    - name: Save LLVM install cache
      if: steps.restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ steps.vars.outputs.prefix }}
        key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-version }}-${{ inputs.llvm-ref }}

    - name: Export toolchain to environment
      shell: bash
      run: |
        set -euo pipefail
        prefix="${{ steps.vars.outputs.prefix }}"
        if [ ! -e "${{ steps.vars.outputs.clang }}" ]; then
          echo "::error::LLVM install missing clang at ${{ steps.vars.outputs.clang }}"
          ls -la "$prefix/bin" || true
          exit 1
        fi
        echo "$prefix/bin" >> "$GITHUB_PATH"
        echo "LLVM_DIR=${{ steps.vars.outputs.llvm_dir }}" >> "$GITHUB_ENV"
        "${{ steps.vars.outputs.clang }}" --version
        echo "::group::ABI debug"
        grep -H "define LLVM_ENABLE_ABI_BREAKING_CHECKS" "$prefix/include/llvm/Config/abi-breaking.h" 2>/dev/null || true
        if [ "$RUNNER_OS" != "Windows" ] && command -v nm >/dev/null 2>&1; then
          echo "TransformUtils DemoteRegToStack iterator type:"
          nm -C "$prefix/lib/libLLVMTransformUtils.a" 2>/dev/null | grep "DemoteRegToStack" | grep -oE "ilist_iterator(_w_bits)?" | sort -u || echo "  (not found)"
        fi
        echo "::endgroup::"
