name: CI

# Build + test the Morok LLVM-IR obfuscator against upstream LLVM trunk (built
# from source, aggressively cached) on every platform, and publish per-platform
# release archives for tags.
on:
  push:
    branches: [master]
    tags: ["v*"]
    paths-ignore: ["docs/**", "web/**", "**/*.md", "LICENSE"]
  pull_request:
    paths-ignore: ["docs/**", "web/**", "**/*.md", "LICENSE"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Single source of truth for the pinned LLVM trunk commit.
  prep:
    runs-on: ubuntu-latest
    outputs:
      llvm_ref: ${{ steps.read.outputs.ref }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: read
        shell: bash
        run: |
          set -euo pipefail
          source .github/llvm-trunk.env
          echo "ref=${LLVM_REF}" >> "$GITHUB_OUTPUT"
          echo "Pinned LLVM trunk: ${LLVM_REF}"

  build:
    needs: prep
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # The matrix runs all four platforms in parallel; within a job the LLVM build
    # uses every core. Cold builds are long; cached runs are minutes.
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64, os: ubuntu-24.04, arch: x86_64 }
          - { name: linux-arm64, os: ubuntu-24.04-arm, arch: arm64 }
          - { name: macos-arm64, os: macos-15, arch: arm64 }
          - { name: windows-x86_64, os: windows-2022, arch: x86_64 }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # libstdc++-14-dev provides the C++ headers for gcc-14, which the
          # freshly-built trunk clang selects as the newest GCC install (without
          # it, <initializer_list> et al. are "not found").
          sudo apt-get install -y --no-install-recommends ninja-build clang lld g++ g++-14 libstdc++-14-dev

      - name: Install CMake + Ninja
        if: runner.os != 'Linux'
        uses: lukka/get-cmake@f5b8fbb4d77cec1acc5a5f9f0df4beffaf5d98d9 # latest, pinned 2026-06-19

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Install sccache
        uses: mozilla/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Configure sccache (local disk)
        shell: bash
        run: |
          set -euo pipefail
          # The GitHub Actions cache *backend* for sccache is unreliable, so use a
          # local-disk cache persisted by actions/cache instead. Stop any server
          # the install action may have started bound to the GHA backend.
          sccache --stop-server >/dev/null 2>&1 || true
          dir="${RUNNER_TEMP//\\//}/sccache"
          mkdir -p "$dir"
          echo "SCCACHE_DIR=$dir" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_SIZE=3G" >> "$GITHUB_ENV"

      - name: Restore sccache cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          # Key on the LLVM recipe (composite action) so any recipe change busts
          # sccache too — otherwise its preprocessor-cache-mode can return stale
          # objects built against a previous config (e.g. a different ABI value).
          key: sccache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/actions/setup-llvm/action.yml', '.github/workflows/ci.yml') }}-${{ github.run_id }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/actions/setup-llvm/action.yml', '.github/workflows/ci.yml') }}-

      - name: Setup LLVM trunk
        id: llvm
        uses: ./.github/actions/setup-llvm
        with:
          llvm-ref: ${{ needs.prep.outputs.llvm_ref }}

      - name: Configure Morok
        shell: bash
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: |
          set -euo pipefail
          args=(
            -S . -B build -G Ninja
            -DCMAKE_BUILD_TYPE=RelWithDebInfo
            -DCMAKE_C_COMPILER="${{ steps.llvm.outputs.clang }}"
            -DCMAKE_CXX_COMPILER="${{ steps.llvm.outputs.clangxx }}"
            -DLLVM_DIR="${{ steps.llvm.outputs.llvm-dir }}"
            -DCMAKE_C_COMPILER_LAUNCHER=sccache
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          )
          if [ "$RUNNER_OS" = "Linux" ]; then
            # The vanilla trunk clang lacks Debian/Ubuntu's multiarch libstdc++
            # path patches: --gcc-install-dir lets it link libstdc++/libgcc, but
            # it cannot locate the C++ *headers*, so add them explicitly with
            # -isystem (<initializer_list> et al. are otherwise "not found").
            ver="$(ls /usr/include/c++/ 2>/dev/null | grep -E '^[0-9]+$' | sort -n | tail -1)"
            triple="$(gcc -dumpmachine)"
            gccdir="/usr/lib/gcc/${triple}/${ver}"
            cxxinc="--gcc-install-dir=${gccdir} -isystem /usr/include/c++/${ver} -isystem /usr/include/${triple}/c++/${ver} -isystem /usr/include/c++/${ver}/backward"
            # The doctest test TUs use braced-init that needs std::initializer_list
            # but rely on libc++ (macOS) pulling it in transitively; libstdc++
            # does not, so force-include it.
            cxxinc="${cxxinc} -include initializer_list"
            args+=(
              -DCMAKE_C_FLAGS="--gcc-install-dir=${gccdir}"
              -DCMAKE_CXX_FLAGS="${cxxinc}"
              # CMake orders some Morok static libs after the LLVM libs they
              # depend on; GNU ld is single-pass and leaves those cross-archive
              # references undefined (ld64/lld-link rescan automatically). Wrap
              # the whole link in a group so GNU ld rescans. --end-group is
              # appended to every link via STANDARD_LIBRARIES, so --start-group
              # must open it for every link kind (exe + the plugin MODULE).
              -DCMAKE_EXE_LINKER_FLAGS=-Wl,--start-group
              -DCMAKE_MODULE_LINKER_FLAGS=-Wl,--start-group
              -DCMAKE_SHARED_LINKER_FLAGS=-Wl,--start-group
              -DCMAKE_CXX_STANDARD_LIBRARIES=-Wl,--end-group
            )
          fi
          if [ "$RUNNER_OS" = "Windows" ]; then
            # The freshly-built clang++ does not pick up the MSVC STL / Windows
            # SDK headers from the environment the way cl does, so pass them
            # explicitly as -imsvc dirs (the MSVC dev shell exports them in
            # EXTERNAL_INCLUDE). Also relax narrowing-in-braced-init, which is
            # only warned (not errored) by the Linux/macOS clang the codebase is
            # developed against.
            imsvc=""
            IFS=';' read -ra _paths <<< "${EXTERNAL_INCLUDE:-${INCLUDE:-}}" || true
            for _d in "${_paths[@]}"; do
              _d="${_d//\\//}"
              [ -n "$_d" ] && imsvc="$imsvc -isystem \"$_d\""
            done
            # Force-include the headers the MSVC STL does not pull in transitively
            # (initializer_list, ostream — the doctest TUs rely on libc++ doing
            # so). And disable toml++'s SSE2 fast-path: clang-targeting-Windows
            # emits its _mm_* intrinsics as undefined external calls (lld-link
            # error), and the scalar scanner is more than fast enough for the tiny
            # Morok config files.
            args+=( -DCMAKE_CXX_FLAGS="-Wno-c++11-narrowing -include initializer_list -include ostream -DTOML_ENABLE_SIMD=0 $imsvc" )
          fi
          cmake "${args[@]}"

      - name: Build Morok
        shell: bash
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: cmake --build build --parallel

      # Explicit save after all compilation so the object cache is uploaded even
      # if the tests below fail.
      - name: Save sccache cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/actions/setup-llvm/action.yml', '.github/workflows/ci.yml') }}-${{ github.run_id }}

      - name: sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          ./run_tests.sh -- --timeout 1800

      - name: Smoke-test the Windows plugin DLL
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          dll=""
          for f in build/src/pipeline/libMorok.dll build/src/pipeline/Morok.dll; do
            [ -f "$f" ] && dll="$f" && break
          done
          [ -n "$dll" ] || { echo "::error::no Morok plugin DLL under build/src/pipeline"; ls -la build/src/pipeline || true; exit 1; }
          clang="${{ steps.llvm.outputs.clang }}"
          opt="$(dirname "$clang")/opt.exe"
          [ -x "$opt" ] || { echo "::error::opt.exe missing next to clang"; ls -la "$(dirname "$clang")" || true; exit 1; }
          echo "plugin=$dll opt=$opt"
          printf 'define i32 @f(i32 %%a, i32 %%b) {\nentry:\n  %%x = add i32 %%a, 1337\n  %%y = xor i32 %%x, %%b\n  ret i32 %%y\n}\n' > t.ll
          # (1) the DLL loads and the New-PM plugin API is accepted.
          "$opt" -load-pass-plugin="$dll" -passes='no-op-module' t.ll -S -o /dev/null
          # (2) canonical baseline (pure opt, no plugin) for a like-for-like diff.
          "$opt" -passes='verify' t.ll -S -o canon.ll
          # (3) the morok pipeline runs (config driven by MOROK_PRESET env, since
          #     the plugin's cl::opts are not parsed by the host on Windows).
          MOROK_PRESET=max "$opt" -load-pass-plugin="$dll" -passes='morok' t.ll -S -o full.ll
          test -s full.ll
          # (4) the transformed IR is still well-formed (catches any ABI / dyn_cast
          #     corruption from a duplicate-state field-offset mismatch).
          "$opt" -passes='verify' full.ll -S -o /dev/null
          # (5) it actually transformed (proves the plugin is not inert).
          if diff -q canon.ll full.ll >/dev/null; then
            echo "::error::-passes=morok (MOROK_PRESET=max) did not transform — plugin inert"
            exit 1
          fi
          echo "Windows plugin DLL is usable (opt -load-pass-plugin path verified)."
          # (6) clang -fpass-plugin auto-injection.  On Windows the plugin's
          #     cl::opts are not visible to clang's option parser (separate LLVM
          #     registry), so '-mllvm -morok' is unknown there; the portable
          #     switch is MOROK_ENABLE (+ MOROK_PRESET for config).  Prove it
          #     compiles AND that the plugin actually engaged (obfuscated object
          #     differs from a clean one).
          printf 'int f(int a,int b){int x=a+1337;return x^b;}\n' > t.c
          "$clang" -O2 -c t.c -o clean.o
          MOROK_ENABLE=1 MOROK_PRESET=max "$clang" -fpass-plugin="$dll" -O2 -c t.c -o obf.o
          test -s obf.o
          if cmp -s clean.o obf.o; then
            echo "::error::clang -fpass-plugin produced an identical object — plugin did not engage"
            exit 1
          fi
          echo "clang -fpass-plugin auto-injection verified (MOROK_ENABLE)."

      - name: Package artifacts
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git rev-parse --short HEAD)"
          stage="morok-${{ matrix.name }}-${sha}"
          mkdir -p "dist/$stage"
          cp LICENSE README.md "dist/$stage/" 2>/dev/null || true

          if [ "$RUNNER_OS" = "Windows" ]; then
            # Loadable New-PM plugin DLL (the LLVM it needs is statically linked
            # into the MODULE; see src/pipeline/CMakeLists.txt), plus the static
            # obfuscator libraries + public headers for in-process consumers.
            dllfound=0
            for f in build/src/pipeline/libMorok.dll build/src/pipeline/Morok.dll; do
              if [ -f "$f" ]; then cp "$f" "dist/$stage/"; dllfound=1; fi
            done
            if [ "$dllfound" -ne 1 ]; then
              echo "::error::no Morok plugin DLL found under build/src/pipeline"
              ls -la build/src/pipeline || true
              exit 1
            fi
            mkdir -p "dist/$stage/lib" "dist/$stage/include"
            while IFS= read -r lib; do
              cp "$lib" "dist/$stage/lib/"
            done < <(find build/src -type f \( -name '*.lib' -o -name '*.a' \) 2>/dev/null)
            cp -R include/. "dist/$stage/include/"
            ( cd dist && 7z a -tzip "${stage}.zip" "$stage" >/dev/null )
            echo "archive=dist/${stage}.zip" >> "$GITHUB_OUTPUT"
          else
            # The loadable New-PM plugin (name varies by platform).
            found=0
            for f in build/src/pipeline/*Morok*.dylib \
                     build/src/pipeline/*Morok*.so; do
              if [ -f "$f" ]; then cp "$f" "dist/$stage/"; found=1; fi
            done
            if [ "$found" -ne 1 ]; then
              echo "::error::no Morok plugin found under build/src/pipeline"
              ls -la build/src/pipeline || true
              exit 1
            fi
            tar -C dist -czf "dist/${stage}.tar.gz" "$stage"
            echo "archive=dist/${stage}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: morok-${{ matrix.name }}
          path: ${{ steps.pkg.outputs.archive }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: dist
          pattern: morok-*
          merge-multiple: true

      - name: Attach to release (tags only)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: dist/*
          fail_on_unmatched_files: true
